services:
  postgres:
    image: postgres:16-alpine
    container_name: league-postgres
    restart: always
    environment:
      POSTGRES_USER: league
      # Secret injecté via .env (POSTGRES_PASSWORD). Défaut `league` conservé pour
      # ne pas casser un volume existant ; définir un secret fort en prod.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-league}
      POSTGRES_DB: league
    volumes:
      - league_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U league -d league"]
      interval: 5s
      timeout: 3s
      retries: 10
    # `default` : réseau interne de la stack prod (backend ↔ postgres, inchangé).
    # `league_edge` : réseau partagé, pour que le backend STAGING puisse lire la prod
    # EN LECTURE SEULE (rôle league_ro) lors de la synchro ELO/stats déclenchée
    # depuis le GOD. Aucune écriture possible (rôle SELECT-only). L'accès reste
    # interne aux conteneurs du VPS — la DB n'est jamais exposée à Internet.
    networks:
      - default
      - league_edge

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: league-backend
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://league:${POSTGRES_PASSWORD:-league}@postgres:5432/league?schema=public
      - PORT=3000
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # On remplace l'IP par le nom de domaine !
        VITE_API_BASE_URL: "https://42league.fr/api" 
    container_name: league-frontend
    restart: always

  caddy:
    image: caddy:alpine
    container_name: league-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
      # On retire le port 3000 ici, Caddy gère tout via 80/443
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend

networks:
  # Réseau partagé inter-stacks (créé/possédé hors de cette compose). Permet au
  # backend staging d'atteindre `league-postgres` en lecture seule (synchro ELO).
  league_edge:
    external: true

volumes:
  league_pgdata:
  caddy_data:
  caddy_config: