name: Dependency audit (npm)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'
  pull_request:
    branches: [main]
    paths:
      - '**/package.json'
      - '**/package-lock.json'

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: npm audit (non-blocking)
        run: |
          set +e
          npm audit --audit-level=high --omit=dev > audit.json || true
          npm audit --audit-level=high --omit=dev
          echo "## npm audit summary" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          npm audit --audit-level=high --omit=dev | tail -20 >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
        continue-on-error: true
