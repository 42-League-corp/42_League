name: Deploy to production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_only:
        description: 'Skip builds and deploy existing :latest images'
        required: false
        default: 'true'

env:
  BACKEND_IMAGE: ghcr.io/42-league-corp/42_league-backend
  FRONTEND_IMAGE: ghcr.io/42-league-corp/42_league-frontend

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'apps/backend/**'
              - 'packages/**'
            frontend:
              - 'apps/web/**'
              - 'packages/**'

  build-backend:
    needs: changes
    if: |
      github.event.inputs.deploy_only != 'true' &&
      (needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest,${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.run_id }}

      - name: Trivy scan (backend)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'
        continue-on-error: true

      - name: Upload Trivy results to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend
        continue-on-error: true

  build-frontend:
    needs: changes
    if: |
      github.event.inputs.deploy_only != 'true' &&
      (needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest,${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.run_id }}

      - name: Trivy scan (frontend)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'
        continue-on-error: true

      - name: Upload Trivy results to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend
        continue-on-error: true

  deploy:
    needs: [build-backend, build-frontend]
    if: |
      always() &&
      (
        github.event.inputs.deploy_only == 'true' ||
        (
          (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped') &&
          (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped') &&
          (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success')
        )
      )
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Debug SSH key
        run: |
          echo "Key length: ${#KEY}"
          echo "First line: $(echo "$KEY" | head -1)"
          echo "Last line: $(echo "$KEY" | tail -1)"
        env:
          KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Copy config files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 163.172.141.178
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.registry.yml,Caddyfile,Makefile.server"
          target: /opt/42_league/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 163.172.141.178
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GITHUB_TOKEN
          script: |
            set -e
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u github-actions --password-stdin
            cd /opt/42_league
            mv Makefile.server Makefile
            # Nettoyage préventif si peu d'espace (< 5GB libre sur /)
            FREE_GB=$(df --output=avail / | tail -1 | awk '{print int($1/1024/1024)}')
            if [ "$FREE_GB" -lt 5 ]; then
              echo "⚠️  $FREE_GB GB libres, nettoyage agressif avant pull"
              docker image prune -af
              docker builder prune -af
            fi
            docker compose -f docker-compose.registry.yml pull
            docker compose -f docker-compose.registry.yml up -d --remove-orphans
            # Reload Caddy config sans downtime (nouveau Caddyfile)
            docker exec league-caddy caddy reload --config /etc/caddy/Caddyfile || docker compose -f docker-compose.registry.yml restart caddy
            # Nettoyage post-deploy : supprime les anciennes versions :sha
            docker image prune -af
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
