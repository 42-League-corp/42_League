name: Deploy to production

on:
  push:
    branches:
      - main

env:
  BACKEND_IMAGE: ghcr.io/42-league-corp/42_league-backend
  FRONTEND_IMAGE: ghcr.io/42-league-corp/42_league-frontend

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'apps/backend/**'
              - 'packages/**'
            frontend:
              - 'apps/web/**'
              - 'packages/**'

  build-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest,${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.run_id }}

  build-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest,${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.run_id }}

  deploy:
    needs: [build-backend, build-frontend]
    if: |
      always() &&
      (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped') &&
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped') &&
      (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy config files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 163.172.141.178
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.registry.yml,Caddyfile,Makefile.server"
          target: /opt/42_league/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 163.172.141.178
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GITHUB_TOKEN
          script: |
            set -e
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u github-actions --password-stdin
            cd /opt/42_league
            mv Makefile.server Makefile
            docker compose -f docker-compose.registry.yml pull
            docker compose -f docker-compose.registry.yml up -d --remove-orphans
            docker image prune -f
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
