name: Deploy to production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_only:
        description: 'Skip builds and deploy existing :main images'
        required: false
        default: 'true'

env:
  BACKEND_IMAGE: ghcr.io/42-league-corp/42_league-backend
  FRONTEND_IMAGE: ghcr.io/42-league-corp/42_league-frontend

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'apps/backend/**'
              - 'packages/**'
            frontend:
              - 'apps/web/**'
              - 'packages/**'

  build-backend:
    needs: changes
    if: |
      github.event.inputs.deploy_only != 'true' &&
      (needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # historique complet → stats de lignes par auteur (À propos)

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Stats de contributions git injectées dans l'image (la prod n'a pas de git).
      - name: Compute contributor git stats
        id: contrib
        run: echo "json=$(bash .github/scripts/contributor-stats.sh)" >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:main,${{ env.BACKEND_IMAGE }}:latest,${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.run_id }}
            CONTRIBUTOR_STATS=${{ steps.contrib.outputs.json }}

      - name: Trivy scan (backend)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'
        continue-on-error: true

      - name: Upload Trivy results to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend
        continue-on-error: true

  build-frontend:
    needs: changes
    if: |
      github.event.inputs.deploy_only != 'true' &&
      (needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # historique complet → comptage des commits (build number)

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute build number
        id: build
        run: |
          echo "count=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date '+%Y-%m-%d %H:%M')" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:main,${{ env.FRONTEND_IMAGE }}:latest,${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.run_id }}
            APP_BUILD=${{ steps.build.outputs.count }}
            APP_DATE=${{ steps.build.outputs.date }}

      - name: Trivy scan (frontend)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'
        continue-on-error: true

      - name: Upload Trivy results to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend
        continue-on-error: true

  deploy:
    needs: [build-backend, build-frontend]
    if: |
      always() &&
      needs.build-backend.result != 'failure' &&
      needs.build-frontend.result != 'failure'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # autorise le seed :main depuis :latest au 1er cutover

    steps:
      - uses: actions/checkout@v5

      - name: Copy config files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 163.172.141.178
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.registry.yml,Caddyfile,Makefile.server"
          target: /opt/42_league/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 163.172.141.178
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GITHUB_TOKEN
          script: |
            set -e
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u github-actions --password-stdin

            # ── Seed :main depuis :latest au TOUT PREMIER cutover ──────────────
            # Un push infra-only ne rebuild pas (paths-filter) ; si :main n'existe
            # pas encore, on le crée depuis :latest (l'image déjà en prod) pour que
            # le pull ci-dessous réussisse. Aux deploys suivants :main existe → sauté.
            for IMG in ghcr.io/42-league-corp/42_league-backend ghcr.io/42-league-corp/42_league-frontend; do
              if ! docker manifest inspect "$IMG:main" >/dev/null 2>&1; then
                echo "Seed $IMG:main depuis :latest"
                docker pull "$IMG:latest"
                docker tag "$IMG:latest" "$IMG:main"
                docker push "$IMG:main"
              fi
            done

            cd /opt/42_league
            mv Makefile.server Makefile

            # ── Validation du Caddyfile AVANT tout redéploiement ───────────────
            # Priorité #1 = zéro downtime. Un Caddyfile invalide (ex : hash
            # basic-auth staging manquant dans caddy.env) ne doit JAMAIS faire
            # tomber la prod. On valide dans un conteneur jetable ; si KO, `set -e`
            # abort le deploy et les conteneurs actuels continuent de tourner.
            # caddy.env stocke le hash bcrypt avec $$ (échappement requis par
            # l'interpolation Compose de env_file). `docker run --env-file` lit la
            # valeur LITTÉRALEMENT ; on dé-échappe $$ -> $ pour valider un bcrypt
            # correct (sinon le provision basic_auth ferait planter la validation).
            CADDY_HASH=$(grep '^STAGING_BASICAUTH_HASH=' caddy.env | cut -d= -f2- | sed 's/\$\$/$/g')
            docker run --rm \
              -v "$PWD/Caddyfile:/etc/caddy/Caddyfile:ro" \
              -e "STAGING_BASICAUTH_HASH=$CADDY_HASH" \
              caddy:alpine caddy validate --config /etc/caddy/Caddyfile

            # ── Nettoyage AVANT le pull ────────────────────────────────────────
            # Les deploys empilent des images :sha ; on nettoie systématiquement
            # avant de tirer les nouvelles. TOUT est non-bloquant (|| true) : un
            # prune déjà en cours ("a prune operation is already running") ou une
            # erreur ne doit JAMAIS faire échouer le deploy (set -e sinon abort).
            echo "Espace avant nettoyage :"; df -h / | tail -1
            docker container prune -f || true
            docker image prune -af || true
            docker builder prune -af || true
            echo "Espace après nettoyage :"; df -h / | tail -1

            docker compose -f docker-compose.registry.yml pull
            docker compose -f docker-compose.registry.yml up -d --remove-orphans
            # Recrée Caddy pour qu'il remonte le Caddyfile fraîchement copié.
            # (un 'caddy reload' lit le fichier interne au conteneur et n'applique
            #  pas toujours la nouvelle config — la recréation est fiable à 100%)
            docker compose -f docker-compose.registry.yml up -d --force-recreate caddy

            # Nettoyage post-deploy : vire les images :sha désormais inutilisées.
            docker image prune -af || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
