name: Deploy to staging

# Pipeline STAGING : build des images `:develop` → push GHCR → déploiement SSH
# dans /opt/42_league_staging/. N'interfère JAMAIS avec la prod :
#   - images taguées `:develop` (la prod tire `:main`)
#   - déploie une stack compose distincte (projet 42_league_staging)
#   - ne touche pas au Caddy edge (qui vit dans la stack prod)
on:
  push:
    branches:
      - develop
  workflow_dispatch:

env:
  BACKEND_IMAGE: ghcr.io/42-league-corp/42_league-backend
  FRONTEND_IMAGE: ghcr.io/42-league-corp/42_league-frontend
  # URL publique (non sensible) bakée dans le bundle Vite du frontend staging.
  STAGING_API_URL: https://staging.oneleague.fr/api

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # historique complet → stats de lignes par auteur (À propos)

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Stats de contributions git injectées dans l'image (la prod n'a pas de git).
      - name: Compute contributor git stats
        id: contrib
        run: echo "json=$(bash .github/scripts/contributor-stats.sh)" >> "$GITHUB_OUTPUT"

      - name: Build and push backend (develop)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:develop,${{ env.BACKEND_IMAGE }}:dev-${{ github.sha }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.run_id }}
            CONTRIBUTOR_STATS=${{ steps.contrib.outputs.json }}

      - name: Trivy scan (backend)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:dev-${{ github.sha }}
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'
        continue-on-error: true

      - name: Upload Trivy results to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend-staging
        continue-on-error: true

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # historique complet → comptage des commits (build number)

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute build number
        id: build
        run: |
          echo "count=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date '+%Y-%m-%d %H:%M')" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend (develop)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:develop,${{ env.FRONTEND_IMAGE }}:dev-${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=${{ env.STAGING_API_URL }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.run_id }}
            APP_BUILD=${{ steps.build.outputs.count }}
            APP_DATE=${{ steps.build.outputs.date }}

      - name: Trivy scan (frontend)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:dev-${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'
        continue-on-error: true

      - name: Upload Trivy results to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend-staging
        continue-on-error: true

  deploy:
    needs: [build-backend, build-frontend]
    if: |
      always() &&
      needs.build-backend.result != 'failure' &&
      needs.build-frontend.result != 'failure'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Copy staging config to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 163.172.141.178
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.staging.yml,Makefile.staging"
          target: /opt/42_league_staging/

      - name: Deploy staging via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 163.172.141.178
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GITHUB_TOKEN
          script: |
            set -e
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u github-actions --password-stdin
            cd /opt/42_league_staging
            mv Makefile.staging Makefile

            # Réseau partagé edge (idempotent). Le Caddy edge (stack prod) y est
            # déjà attaché ; il atteindra les nouveaux conteneurs staging via DNS.
            docker network create league_edge 2>/dev/null || true

            docker compose -f docker-compose.staging.yml pull
            # --remove-orphans est scopé au PROJET staging : n'affecte jamais la prod.
            docker compose -f docker-compose.staging.yml up -d --remove-orphans

            # Nettoyage des anciennes images :dev-<sha> devenues inutiles.
            docker image prune -af || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
