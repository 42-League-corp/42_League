<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>One League</title>
    <style>
      :root {
        --bg-0: #0b0f17;
        --bg-1: #111827;
        --bg-2: #1a2233;
        --border: #243044;
        --teal: #00d9dc;
        --teal-dim: #00babc;
        --teal-deep: #007577;
        --teal-glow: rgba(0, 217, 220, 0.35);
        --teal-soft: rgba(0, 217, 220, 0.08);
        --gold: #ffb71b;
        --red: #ff3b5c;
        --muted: #6b7689;
        --muted-2: #95a3b8;
        --text: #e6ecf5;
        --text-strong: #fff;
      }

      @keyframes scan { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
      @keyframes fade-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse {
        0%, 100% { box-shadow: 0 0 0 0 var(--teal-glow); }
        50% { box-shadow: 0 0 0 10px transparent; }
      }

      * { box-sizing: border-box; }
      body {
        font-family: 'Inter', system-ui, sans-serif;
        margin: 0;
        padding: 0;
        width: 300px;
        color: var(--text);
        background:
          radial-gradient(ellipse at top, var(--teal-soft) 0%, transparent 60%),
          var(--bg-0);
        font-size: 13px;
      }

      header {
        display: flex; align-items: center; gap: 10px;
        padding: 14px 16px 12px;
        border-bottom: 1px solid var(--border);
        background: linear-gradient(180deg, var(--bg-1) 0%, transparent 100%);
      }
      header img {
        width: 26px; height: 26px; border-radius: 4px;
        border: 1px solid var(--teal-deep);
        box-shadow: 0 0 10px var(--teal-glow);
      }
      h1 {
        font-size: 12px; margin: 0;
        font-weight: 800; letter-spacing: 0.22em;
        text-transform: uppercase;
        background: linear-gradient(90deg, var(--teal) 0%, #fff 50%, var(--gold) 100%);
        -webkit-background-clip: text; background-clip: text;
        color: transparent;
      }
      h1::after {
        content: '◆';
        margin-left: 8px;
        color: var(--teal); font-size: 8px;
        vertical-align: middle;
        animation: scan 2s infinite;
        -webkit-text-fill-color: var(--teal);
      }

      .body { padding: 14px 16px 16px; animation: fade-in 200ms ease-out; }

      /* Auth state card */
      .auth-state {
        display: flex; flex-direction: column; gap: 8px; align-items: center;
        padding: 14px 8px;
        border-radius: 4px;
        margin-bottom: 12px;
        position: relative;
      }
      .auth-state.connected {
        background: linear-gradient(180deg, var(--teal-soft) 0%, transparent 100%);
        border: 1px solid var(--teal-deep);
      }
      .auth-state.anon {
        background: var(--bg-1);
        border: 1px solid var(--border);
      }
      .auth-state.connecting {
        background: var(--bg-1);
        border: 1px solid var(--teal-deep);
      }

      .avatar {
        width: 44px; height: 44px; border-radius: 50%;
        background: linear-gradient(135deg, var(--teal-deep), var(--teal));
        color: #001416;
        display: flex; align-items: center; justify-content: center;
        font-size: 18px; font-weight: 900; text-transform: uppercase;
        border: 2px solid var(--teal);
        box-shadow: 0 0 16px var(--teal-glow);
      }
      .connecting .avatar { animation: pulse 1.2s infinite; }
      .anon .avatar {
        background: var(--bg-2); color: var(--muted-2);
        border: 1px dashed var(--muted);
        box-shadow: none;
      }
      .avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; }

      .login-label { font-weight: 700; font-size: 13px; color: var(--text-strong); letter-spacing: 0.02em; }
      .elo-label {
        color: var(--gold); font-size: 10px; font-weight: 700;
        font-variant-numeric: tabular-nums;
        padding: 2px 7px;
        background: rgba(255, 183, 27, 0.12);
        border: 1px solid var(--gold);
        border-radius: 2px;
        letter-spacing: 0.08em; text-transform: uppercase;
      }

      button {
        font-family: inherit; font-size: 11px; font-weight: 700;
        text-transform: uppercase; letter-spacing: 0.08em;
        background: linear-gradient(180deg, var(--teal) 0%, var(--teal-dim) 100%);
        color: #001416;
        border: none; border-radius: 3px;
        padding: 10px 12px; cursor: pointer; width: 100%;
        display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        transition: filter 120ms, transform 80ms, box-shadow 120ms;
      }
      button:hover { filter: brightness(1.1); box-shadow: 0 0 14px var(--teal-glow); }
      button:active { transform: scale(0.97); }
      button:disabled { opacity: 0.4; cursor: default; transform: none; filter: none; box-shadow: none; }
      button.ghost {
        background: transparent; color: var(--muted-2);
        border: 1px solid var(--border);
        padding: 8px 10px; font-size: 10px;
      }
      button.ghost:hover {
        color: var(--teal); border-color: var(--teal);
        background: var(--teal-soft); box-shadow: none;
      }
      button.danger {
        background: transparent; color: var(--red); border: 1px solid var(--red);
        padding: 8px 10px; font-size: 10px;
      }
      button.danger:hover { background: rgba(255, 59, 92, 0.08); box-shadow: 0 0 10px rgba(255, 59, 92, 0.4); }

      .row { display: flex; gap: 8px; }
      .row > * { flex: 1; }
      .actions { display: flex; flex-direction: column; gap: 8px; }

      .spinner {
        width: 12px; height: 12px;
        border: 2px solid rgba(0, 0, 0, 0.2); border-top-color: #001416;
        border-radius: 50%; animation: spin 0.7s linear infinite;
        display: inline-block;
      }

      .info {
        text-align: center; font-size: 10px; color: var(--muted);
        text-transform: uppercase; letter-spacing: 0.1em;
        margin: 10px 0 0;
      }
      .info code {
        background: var(--bg-2); color: var(--teal);
        padding: 2px 5px; border-radius: 2px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        text-transform: none; letter-spacing: 0;
      }

      .error { color: var(--red); font-size: 11px; margin-top: 8px; text-align: center; }
    </style>
  </head>
  <body>
    <header>
      <img src="../../icons/42_league.png" alt="" />
      <h1>One League</h1>
    </header>

    <div class="body">
      <div id="state" class="auth-state anon">
        <div class="avatar" id="avatar">42</div>
        <div class="login-label" id="login-label">…</div>
        <div class="elo-label" id="elo-label" style="display:none"></div>
      </div>

      <div class="actions">
        <button id="open-web">→ Ouvrir One League</button>
        <div class="row">
          <button id="auth-action" class="ghost">…</button>
          <button id="open-intra" class="ghost">Intra</button>
        </div>
      </div>

      <div id="error" class="error"></div>
      <p class="info">Web app : <code id="url-label"></code></p>
    </div>

    <script type="module" src="./index.ts"></script>
  </body>
</html>
