<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#0a3e3f"/>
      <stop offset="60%" stop-color="#0b0f17"/>
      <stop offset="100%" stop-color="#06080d"/>
    </radialGradient>
    <linearGradient id="num" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d9dc"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffb71b"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="none" stroke="rgba(0,217,220,0.25)" stroke-width="2"/>
  <text
    x="256" y="328"
    text-anchor="middle"
    font-family="Inter, system-ui, sans-serif"
    font-size="256"
    font-weight="900"
    fill="url(#num)"
    filter="url(#glow)"
    letter-spacing="-12"
  >42</text>
  <text
    x="256" y="402"
    text-anchor="middle"
    font-family="JetBrains Mono, Menlo, monospace"
    font-size="42"
    font-weight="800"
    fill="#00d9dc"
    letter-spacing="14"
    opacity="0.85"
  >LEAGUE</text>
</svg>
