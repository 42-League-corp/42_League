<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="League Coin">
  <defs>
    <radialGradient id="lc-face" cx="38%" cy="32%" r="80%">
      <stop offset="0%" stop-color="#e9e3ff"/>
      <stop offset="42%" stop-color="#b8a9e8"/>
      <stop offset="78%" stop-color="#8b6fce"/>
      <stop offset="100%" stop-color="#5b3fa0"/>
    </radialGradient>
    <linearGradient id="lc-rim" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#d9d2f2"/>
      <stop offset="50%" stop-color="#7c63c0"/>
      <stop offset="100%" stop-color="#3f2a78"/>
    </linearGradient>
    <linearGradient id="lc-glyph" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbfaff"/>
      <stop offset="100%" stop-color="#cfc4f0"/>
    </linearGradient>
    <filter id="lc-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#2a1a55" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Outer rim -->
  <circle cx="64" cy="64" r="60" fill="url(#lc-rim)" filter="url(#lc-shadow)"/>
  <!-- Knurled edge ticks -->
  <g stroke="#2f1f5e" stroke-opacity="0.35" stroke-width="2">
    <circle cx="64" cy="64" r="58" fill="none" stroke-dasharray="2 4"/>
  </g>
  <!-- Coin face -->
  <circle cx="64" cy="64" r="50" fill="url(#lc-face)"/>
  <!-- Inner engraved ring -->
  <circle cx="64" cy="64" r="44" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1.5"/>
  <circle cx="64" cy="64" r="41" fill="none" stroke="#3a2670" stroke-opacity="0.35" stroke-width="1"/>

  <!-- Glyph: 42 League "42" -->
  <text x="64" y="80" text-anchor="middle"
        font-family="'Orbitron','Rajdhani',system-ui,sans-serif" font-weight="800"
        font-size="42" fill="url(#lc-glyph)" letter-spacing="-1">42</text>

  <!-- Specular highlight -->
  <ellipse cx="48" cy="42" rx="22" ry="13" fill="#ffffff" fill-opacity="0.28" transform="rotate(-24 48 42)"/>
</svg>
