<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="League Coin">
  <defs>
    <!-- Face supérieure : métal violet, lumière en haut-gauche. -->
    <radialGradient id="lc-face" cx="38%" cy="28%" r="88%">
      <stop offset="0%" stop-color="#efe9ff"/>
      <stop offset="38%" stop-color="#c3afef"/>
      <stop offset="74%" stop-color="#8a6dd0"/>
      <stop offset="100%" stop-color="#583ca0"/>
    </radialGradient>
    <!-- Tranche (cylindre) : plus sombre vers le bas → effet d'épaisseur 3D. -->
    <linearGradient id="lc-side" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c61c6"/>
      <stop offset="45%" stop-color="#49318f"/>
      <stop offset="100%" stop-color="#271853"/>
    </linearGradient>
    <!-- Liseré lumineux à la jonction face/tranche. -->
    <linearGradient id="lc-rimlight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#e9dfff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Glyphe « 42 » gravé, or premium. -->
    <linearGradient id="lc-glyph" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff4c8"/>
      <stop offset="55%" stop-color="#ffcf63"/>
      <stop offset="100%" stop-color="#e7a52f"/>
    </linearGradient>
    <!-- Reflet spéculaire diffus sur la face. -->
    <radialGradient id="lc-gloss" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ombre portée au sol -->
  <ellipse cx="64" cy="108" rx="45" ry="6.5" fill="#190f3a" opacity="0.42"/>

  <!-- Disque du dessous : sa partie basse non recouverte = l'épaisseur visible -->
  <ellipse cx="64" cy="67" rx="52" ry="33" fill="url(#lc-side)"/>
  <!-- Bord moleté (seul l'arc bas ressort sous la face) -->
  <ellipse cx="64" cy="67" rx="52" ry="33" fill="none" stroke="#1c1046" stroke-opacity="0.5" stroke-width="3" stroke-dasharray="3 5"/>
  <ellipse cx="64" cy="67" rx="52" ry="33" fill="none" stroke="#2a1a5e" stroke-opacity="0.55" stroke-width="1.5"/>

  <!-- Face supérieure -->
  <ellipse cx="64" cy="52" rx="52" ry="33" fill="url(#lc-face)"/>
  <!-- Liseré lumineux + arête de la face -->
  <ellipse cx="64" cy="53.5" rx="50.5" ry="31.5" fill="none" stroke="url(#lc-rimlight)" stroke-width="2"/>
  <ellipse cx="64" cy="52" rx="52" ry="33" fill="none" stroke="#37236c" stroke-opacity="0.5" stroke-width="1.4"/>

  <!-- Anneaux gravés concentriques -->
  <ellipse cx="64" cy="52" rx="44" ry="27" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.3"/>
  <ellipse cx="64" cy="52" rx="41" ry="25" fill="none" stroke="#33216a" stroke-opacity="0.35" stroke-width="1"/>

  <!-- Glyphe « 42 » — compressé verticalement pour épouser la face inclinée -->
  <g transform="translate(64 52) scale(1 0.8)">
    <text x="0" y="14" text-anchor="middle"
          font-family="'Orbitron','Rajdhani',system-ui,sans-serif" font-weight="800"
          font-size="42" fill="url(#lc-glyph)" letter-spacing="-1"
          stroke="#7a5410" stroke-opacity="0.35" stroke-width="0.6"
          paint-order="stroke">42</text>
  </g>

  <!-- Reflet spéculaire -->
  <ellipse cx="46" cy="39" rx="25" ry="12" fill="url(#lc-gloss)" transform="rotate(-18 46 39)"/>
</svg>
