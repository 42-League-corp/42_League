server {
  listen 80;
  server_tokens off;

  root /usr/share/nginx/html;
  index index.html;

  # Compression à la volée. gzip_static sert les .gz pré-compressés s'ils existent
  # (générés par vite-plugin-compression) avant de repasser en temps-réel.
  gzip on;
  gzip_static on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types text/plain text/html text/css application/javascript application/json
             application/manifest+json image/svg+xml application/wasm;
  gzip_vary on;
  gzip_proxied any;

  # ── Assets hashés par Vite (/assets/<nom>-<hash>.js|css) ──────────────────
  # Le hash change à chaque build → le contenu est IMMUABLE. Cache 1 an,
  # jamais revalidé : zéro requête réseau sur les visites suivantes.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # ── Images & polices servies depuis la racine (portraits /sf, avatars, woff2…)
  # Pas de hash dans le nom → cache moyen (30 j) ; un nouveau déploiement met de
  # toute façon à jour le service worker (precache versionné par Workbox).
  location ~* \.(?:png|jpe?g|gif|webp|avif|svg|ico|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    try_files $uri =404;
  }

  # ── Fichiers qui DOIVENT toujours être réévalués ──────────────────────────
  # Le SW, le manifest et index.html pilotent les mises à jour : un cache long
  # ici bloquerait la livraison des nouveaux builds. On force la revalidation.
  location = /sw.js {
    add_header Cache-Control "no-cache";
  }
  location = /manifest.webmanifest {
    add_header Cache-Control "no-cache";
  }
  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  # ── SPA fallback ──────────────────────────────────────────────────────────
  location / {
    try_files $uri $uri/ /index.html;
  }
}
