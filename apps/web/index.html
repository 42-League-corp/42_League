<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0c0a08" />
    <meta name="description" content="42 League — Babyfoot ranked pour les étudiants 42" />

    <!-- PWA: iOS standalone -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="42 League" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Favicons & touch icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Préchargement de l'icône du SplashScreen (élément LCP) : la requête part
         dès le parsing HTML au lieu d'attendre le bootstrap JS. -->
    <link rel="preload" as="image" href="/apple-touch-icon.png" />

    <!-- Préchargement des logos d'univers (évite le flash gris↔couleur du GameModeSwitch) -->
    <link rel="preload" as="image" href="/smash-color.png" />
    <link rel="preload" as="image" href="/smash-grey.png" />
    <link rel="preload" as="image" href="/sf-color.png" />
    <link rel="preload" as="image" href="/sf-grey.png" />

    <!-- Fonts : preconnect + chargement non bloquant (évite le render-blocking).
         La feuille est chargée en media="print" puis basculée en "all" au load ;
         <noscript> assure le fallback sans JS. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700;800&family=Orbitron:wght@500;600;700;800;900&family=Rajdhani:wght@500;600;700&family=Russo+One&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700;800&family=Orbitron:wght@500;600;700;800;900&family=Rajdhani:wght@500;600;700&family=Russo+One&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700;800&family=Orbitron:wght@500;600;700;800;900&family=Rajdhani:wght@500;600;700&family=Russo+One&display=swap"
      />
    </noscript>

    <title>42 League</title>
  </head>
  <body class="bg-bg-0 text-text antialiased font-sans">
    <div id="root"></div>
    <!-- Preview/captures : neutralise le flux SSE pour que le réseau soit "idle"
         (sinon preview_screenshot time-out). Totalement inerte sauf si le flag
         localStorage __previewStatic="1" est posé (jamais en prod). -->
    <script>
      try {
        if (localStorage.getItem('__previewStatic') === '1') {
          document.documentElement.classList.add('preview-static');
          if (window.EventSource) {
            window.EventSource = class {
              constructor() {}
              close() {}
              addEventListener() {}
              removeEventListener() {}
              dispatchEvent() { return false; }
            };
          }
        }
      } catch (_) {}
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
