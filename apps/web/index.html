<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0c0a08" />
    <!-- Thème sombre permanent : les surfaces par défaut du navigateur
         (overscroll, safe-area, bande de la barre d'URL mobile) sont peintes en
         sombre dès le 1er paint au lieu de blanc en mode clair OS. -->
    <meta name="color-scheme" content="dark" />
    <meta name="description" content="Créez des tournois et classements Elo sur votre campus 42. Babyfoot, jeux vidéo, jeux de société... Dynamisez votre communauté 42 en quelques clics !" />
    <meta name="keywords" content="42 school, campus 42, tournois, leaderboard, elo, babyfoot, classement, jeux, étudiants, gamification" />
    <link rel="canonical" href="https://oneleague.fr/" />

    <!-- Open Graph (partage réseaux sociaux + aperçu Google) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://oneleague.fr/" />
    <meta property="og:site_name" content="One League" />
    <meta property="og:title" content="One League | Gamifiez votre Campus : Leaderboard, Elo et Tournois" />
    <meta property="og:description" content="Créez des tournois et classements Elo sur votre campus 42. Babyfoot, jeux vidéo, jeux de société... Dynamisez votre communauté 42 en quelques clics !" />
    <meta property="og:image" content="https://oneleague.fr/icon-512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:image:alt" content="One League — logo" />
    <meta property="og:locale" content="fr_FR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="One League | Gamifiez votre Campus : Leaderboard, Elo et Tournois" />
    <meta name="twitter:description" content="Créez des tournois et classements Elo sur votre campus 42. Babyfoot, jeux vidéo, jeux de société... Dynamisez votre communauté 42 en quelques clics !" />
    <meta name="twitter:image" content="https://oneleague.fr/icon-512.png" />

    <!-- PWA: iOS standalone -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="42 League" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Favicons & touch icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Préchargement du logo desktop (élément LCP) : la requête part dès le
         parsing HTML sans attendre le bootstrap JS ni le CSS. -->
    <link rel="preload" as="image" href="/logo-wordmark.webp" type="image/webp" />
    <!-- Préchargement de l'icône du SplashScreen (LCP mobile) -->
    <link rel="preload" as="image" href="/apple-touch-icon.png" />

    <!-- Préchargement des logos d'univers (évite le flash gris↔couleur du GameModeSwitch) -->
    <link rel="preload" as="image" href="/smash-color.webp" type="image/webp" />
    <link rel="preload" as="image" href="/smash-grey.webp" type="image/webp" />
    <link rel="preload" as="image" href="/sf-color.webp" type="image/webp" />
    <link rel="preload" as="image" href="/sf-grey.webp" type="image/webp" />

    <!-- Fonts : preconnect + chargement non bloquant (évite le render-blocking).
         La feuille est chargée en media="print" puis basculée en "all" au load ;
         <noscript> assure le fallback sans JS. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700;800&family=Orbitron:wght@500;600;700;800;900&family=Rajdhani:wght@500;600;700&family=Russo+One&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700;800&family=Orbitron:wght@500;600;700;800;900&family=Rajdhani:wght@500;600;700&family=Russo+One&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700;800&family=Orbitron:wght@500;600;700;800;900&family=Rajdhani:wght@500;600;700&family=Russo+One&display=swap"
      />
    </noscript>

    <title>One League | Gamifiez votre Campus : Leaderboard, Elo et Tournois</title>

    <!-- Structured data JSON-LD (Google rich results) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "One League",
      "alternateName": "42 League",
      "url": "https://oneleague.fr",
      "description": "Créez des tournois et classements Elo sur votre campus 42. Babyfoot, jeux vidéo, jeux de société... Dynamisez votre communauté 42 en quelques clics !",
      "applicationCategory": "GameApplication",
      "operatingSystem": "Web",
      "inLanguage": "fr",
      "audience": { "@type": "EducationalAudience", "educationalRole": "student" },
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "EUR" }
    }
    </script>
  </head>
  <body class="bg-bg-0 text-text antialiased font-sans">
    <div id="root"></div>
    <!-- Preview/captures : neutralise le flux SSE pour que le réseau soit "idle"
         (sinon preview_screenshot time-out). Totalement inerte sauf si le flag
         localStorage __previewStatic="1" est posé (jamais en prod). -->
    <script>
      try {
        if (localStorage.getItem('__previewStatic') === '1') {
          document.documentElement.classList.add('preview-static');
          if (window.EventSource) {
            window.EventSource = class {
              constructor() {}
              close() {}
              addEventListener() {}
              removeEventListener() {}
              dispatchEvent() { return false; }
            };
          }
        }
      } catch (_) {}
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
