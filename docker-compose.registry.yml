services:
  postgres:
    image: postgres:16-alpine
    container_name: league-postgres
    restart: always
    environment:
      POSTGRES_USER: league
      POSTGRES_PASSWORD: league
      POSTGRES_DB: league
    volumes:
      - league_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U league -d league"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    image: ghcr.io/42-league-corp/42_league-backend:main
    container_name: league-backend
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://league:league@postgres:5432/league?schema=public
      - PORT=3000
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: ghcr.io/42-league-corp/42_league-frontend:main
    container_name: league-frontend
    restart: always

  caddy:
    image: caddy:alpine
    container_name: league-caddy
    restart: always
    # Le hash bcrypt du basic-auth staging vit UNIQUEMENT ici (jamais commité).
    # ⚠️ Compose INTERPOLE les valeurs de env_file : les `$` du bcrypt DOIVENT
    # être échappés en `$$` dans caddy.env (Compose les ramène à `$` au runtime).
    #   ex : STAGING_BASICAUTH_HASH=$$2a$$14$$xxxxxxxxxxxxxxxxxxxxxx...
    env_file:
      - caddy.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    # `default`     → réseau de la stack prod (atteint backend/frontend/postgres)
    # `league_edge` → réseau partagé pour atteindre les conteneurs du STAGING.
    #                 C'est ce qui fait de ce Caddy l'unique reverse-proxy edge.
    networks:
      - default
      - league_edge

# Réseau partagé entre la stack prod (ce fichier) et la stack staging.
# Créé une seule fois sur le serveur : `docker network create league_edge`.
networks:
  league_edge:
    external: true

volumes:
  league_pgdata:
  caddy_data:
  caddy_config:
