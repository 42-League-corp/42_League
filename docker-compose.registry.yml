services:
  postgres:
    image: postgres:16-alpine
    container_name: league-postgres
    restart: always
    environment:
      POSTGRES_USER: league
      POSTGRES_PASSWORD: league
      POSTGRES_DB: league
    volumes:
      - league_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U league -d league"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    image: ghcr.io/42-league-corp/42_league-backend:latest
    container_name: league-backend
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://league:league@postgres:5432/league?schema=public
      - PORT=3000
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: ghcr.io/42-league-corp/42_league-frontend:latest
    container_name: league-frontend
    restart: always

  caddy:
    image: caddy:alpine
    container_name: league-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend

volumes:
  league_pgdata:
  caddy_data:
  caddy_config:
