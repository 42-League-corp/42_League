services:
  postgres:
    image: postgres:16-alpine
    container_name: league-postgres
    environment:
      POSTGRES_USER: league
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-league}
      POSTGRES_DB: league
    ports:
      # Loopback uniquement : la base de dev n'est PAS exposée au réseau (LAN
      # campus). Docker contourne UFW — sans le préfixe 127.0.0.1, n'importe qui
      # sur le sous-réseau pourrait s'y connecter avec des identifiants triviaux.
      - "127.0.0.1:5432:5432"
    volumes:
      - league_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U league -d league"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  league_pgdata:
